name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v2.8.0)"
        required: true
        type: string

permissions:
  contents: read # Checkout only
  packages: write # Required for pushing images to GHCR

env:
  REGISTRY: ghcr.io
  # Image path under the registry. metadata-action lowercases the owner for GHCR,
  # so a fork owner like "Aledantee" becomes ghcr.io/aledantee/worker-v1-vllm.
  IMAGE_NAME: ${{ github.repository_owner }}/worker-v1-vllm

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "Disk before cleanup:"; df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force || true
          echo "Disk after cleanup:"; df -h /

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Pin to the resolved version only; metadata-action auto-adds the OCI
          # labels (incl. org.opencontainers.image.source, which links the package
          # to this repository).
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
          flavor: latest=false
          labels: |
            org.opencontainers.image.title=worker-v1-vllm
            org.opencontainers.image.description=Runpod Serverless vLLM worker

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Release summary
        run: |
          echo "Released ${{ steps.version.outputs.version }}"
          echo "Image(s):"
          echo "${{ steps.meta.outputs.tags }}"
